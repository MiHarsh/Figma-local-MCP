name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    if: ${{ github.repository_owner == 'MiHarsh' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
        if: ${{ steps.release.outputs.release_created }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
        if: ${{ steps.release.outputs.release_created }}

      - name: Install dependencies
        run: pnpm install
        if: ${{ steps.release.outputs.release_created }}

      - name: Type check
        run: pnpm type-check
        if: ${{ steps.release.outputs.release_created }}

      - name: Build
        run: pnpm build
        if: ${{ steps.release.outputs.release_created }}

      - name: Publish to npm
        run: pnpm publish --no-git-checks --provenance --access public
        env:
          NODE_ENV: production
        if: ${{ steps.release.outputs.release_created }}

      - name: Update server.json version
        run: |
          VERSION="${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}"
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp && mv server.tmp server.json
        if: ${{ steps.release.outputs.release_created }}

  # Build standalone binaries so users can download from GitHub Releases
  # without needing Node.js installed
  standalone-binaries:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            artifact: figma-local-mcp-linux-x64
          - os: macos-latest
            target: darwin-arm64
            artifact: figma-local-mcp-darwin-arm64
          - os: windows-latest
            target: win-x64
            artifact: figma-local-mcp-win-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Compile standalone binary
        run: bun build dist/bin.js --compile --outfile ${{ matrix.artifact }}

      - name: Upload binary to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} ${{ matrix.artifact }} --clobber

  # Build Figma plugin and upload as a zip so users can download and
  # import directly without cloning the repo
  figma-plugin:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: figma-plugin
        run: npm install

      - name: Build plugin
        working-directory: figma-plugin
        run: npm run build

      - name: Create plugin zip
        run: |
          mkdir -p figma-plugin-release
          cp figma-plugin/manifest.json figma-plugin-release/
          cp -r figma-plugin/dist figma-plugin-release/
          cd figma-plugin-release && zip -r ../figma-plugin.zip .

      - name: Upload plugin zip to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} figma-plugin.zip --clobber
